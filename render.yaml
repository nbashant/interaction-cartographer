services:
  - type: web
    name: glitchly-app
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build && npx playwright install chromium
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/playwright
